name: Generate snake animation

on:
  schedule: # run automatically every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch: # allows you to run this workflow manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: add MCODER text to SVGs
        run: python3 -c "
import glob
for f in glob.glob('dist/*.svg'):
    with open(f) as fh:
        svg = fh.read()
    text = '<g><text x=\"50%\" y=\"160\" font-family=\"Arial,sans-serif\" font-size=\"26\" font-weight=\"bold\" fill=\"#00BFFF\" text-anchor=\"middle\" opacity=\"0\"><animate attributeName=\"opacity\" begin=\"10s\" dur=\"0.8s\" fill=\"freeze\" to=\"1\"/>MCODER</text></g>'
    svg = svg.replace('</svg>', text + '</svg>')
    with open(f, 'w') as fh:
        fh.write(svg)
"

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
